# =============================================================================
# HPYS — Host Nginx (Oracle Ubuntu) reverse proxy
# Install: sudo cp nginx/hpys-host.conf /etc/nginx/sites-available/hpys
#          sudo ln -sf /etc/nginx/sites-available/hpys /etc/nginx/sites-enabled/hpys
#          sudo nginx -t && sudo systemctl reload nginx
#
# Replace YOUR_DOMAIN / SSL paths. Cloudflare Flexible/Full SSL recommended Full (strict).
# Body size MUST match backend multer (500MB) or large reel uploads fail at the proxy.
# =============================================================================

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN api.YOUR_DOMAIN;
    return 301 https://$host$request_uri;
}

# Main site (SPA + API path proxy)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name YOUR_DOMAIN;

    ssl_certificate     /etc/ssl/hpys/origin.pem;
    ssl_certificate_key /etc/ssl/hpys/origin.key;

    client_max_body_size 500M;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    location = /health {
        proxy_pass http://127.0.0.1:8000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Express mounts reels at /api/reels (and dual /reels). Keep URI intact.
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        client_max_body_size 500M;
    }

    location /uploads/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /socket.io/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Optional dedicated API host (e.g. api26.hpys.in) — entire vhost → backend
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.YOUR_DOMAIN;

    ssl_certificate     /etc/ssl/hpys/origin.pem;
    ssl_certificate_key /etc/ssl/hpys/origin.key;

    client_max_body_size 500M;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    proxy_request_buffering off;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}

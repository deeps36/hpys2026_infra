# =============================================================================
# HPYS — Host Nginx (Ubuntu 24.04 / nginx 1.24)
# Drop-in: no placeholders for domains. Compatible with stock nginx (no "http2 on;").
#
# Upload size is NOT hard-coded: deploy.sh substitutes __UPLOAD_MAX_SIZE__ from
# .env UPLOAD_MAX_SIZE (nginx size, e.g. 0=unlimited, 4G, 8G).
#
#   sudo cp /opt/hpys/nginx/hpys-host.conf /etc/nginx/sites-available/hpys
#   (prefer: ./deploy.sh which renders + nginx -t + reload)
#
# Upstreams (Docker Compose, loopback only):
#   frontend      127.0.0.1:8080
#   backend       127.0.0.1:8000
#   filebrowser   127.0.0.1:8081
#
# TLS: Let's Encrypt (certbot) — matches the live Oracle deployment.
# =============================================================================

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ---------------------------------------------------------------------------
# HTTP → HTTPS (all public hostnames)
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name hpys.in www.hpys.in api26.hpys.in files.hpys.in;
    return 301 https://$host$request_uri;
}

# ---------------------------------------------------------------------------
# Main site — hpys.in / www.hpys.in
# ---------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name hpys.in www.hpys.in;

    ssl_certificate     /etc/letsencrypt/live/hpys.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hpys.in/privkey.pem;

    client_max_body_size __UPLOAD_MAX_SIZE__;
    client_body_timeout 600s;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
    proxy_request_buffering off;
    proxy_buffering off;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location = /health {
        proxy_pass http://127.0.0.1:8000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        proxy_buffering off;
        client_max_body_size __UPLOAD_MAX_SIZE__;
        client_body_timeout 600s;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location /uploads/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        proxy_buffering off;
        client_max_body_size __UPLOAD_MAX_SIZE__;
        client_body_timeout 600s;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location /socket.io/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        proxy_buffering off;
        client_max_body_size __UPLOAD_MAX_SIZE__;
        proxy_read_timeout 86400;
        proxy_send_timeout 600s;
    }

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ---------------------------------------------------------------------------
# API host — api26.hpys.in → backend
# ---------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api26.hpys.in;

    ssl_certificate     /etc/letsencrypt/live/hpys.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hpys.in/privkey.pem;

    client_max_body_size __UPLOAD_MAX_SIZE__;
    client_body_timeout 600s;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
    proxy_request_buffering off;
    proxy_buffering off;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_request_buffering off;
        proxy_buffering off;
        client_max_body_size __UPLOAD_MAX_SIZE__;
        client_body_timeout 600s;
        proxy_read_timeout 86400;
        proxy_send_timeout 600s;
    }
}

